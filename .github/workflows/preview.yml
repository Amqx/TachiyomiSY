name: Dispatch preview builds

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create preview tag
        run: |
          git tag "preview-${{ github.run_number }}"
          git push origin "preview-${{ github.run_number }}"

      - name: Trigger preview build
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.PREVIEW_DISPATCH_TOKEN }}
          repository: Amqx/TachiyomiSYPreview
          event-type: build-preview
          client-payload: '{"sha": "${{ github.sha }}", "ref": "${{ github.ref }}"}'
